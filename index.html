<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="connect-src 'self' https://explorer-api.walletconnect.com https://*.base.org https://*.wrpcd.net https://*.thirdweb.com; img-src 'self' data: https:;">
    
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/miniapp-sdk@latest/dist/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@thirdweb-dev/storage@latest/dist/thirdweb-dev-storage.browser.umd.min.js"></script>
    
    <title>BaseKit.online | Farcaster & Base Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
    <style>
        @keyframes pulse-green { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #sync-indicator { animation: pulse-green 2s infinite; }
        body { background-color: #00050a; color: #fff; font-family: sans-serif; }
        .base-blue { color: #0052FF; }
        .glass { background: rgba(0, 82, 255, 0.05); border: 1px solid rgba(0, 82, 255, 0.15); border-radius: 2rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        input, textarea { background: #000; border: 1px solid #1a2a4a; color: white; padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 8px; outline: none; }
        .lang-btn { cursor: pointer; padding: 6px 12px; border-radius: 8px; font-size: 11px; border: 1px solid rgba(255,255,255,0.1); }
        .lang-active { background: #0052FF !important; color: white !important; }
        .farcaster-card { background: rgba(133, 93, 205, 0.1); border: 1px solid rgba(133, 93, 205, 0.3); border-radius: 1.5rem; }
        .preview-box { width: 100%; min-height: 150px; border: 2px dashed #0052FF; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; overflow: hidden; background: #000; cursor: pointer; position: relative; }
    </style>
</head>
<body class="p-4">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-8 sticky top-0 bg-[#00050a]/90 backdrop-blur-md z-50 py-3">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-bold italic tracking-tighter">BASEKIT<span class="base-blue">.ONLINE</span></h1>
        </div>
        <div class="flex gap-2">
            <button onclick="handleWallet()" id="wallet-btn" class="bg-[#0052FF] px-6 py-2 rounded-full font-bold text-sm shadow-lg flex items-center gap-2 transition hover:bg-blue-600">
                <i class="fas fa-wallet"></i> <span>Connect Wallet</span>
            </button>
            <button id="disconnect-btn" onclick="disconnect()" class="hidden bg-red-600/20 text-red-500 border border-red-600/30 px-4 py-2 rounded-full font-bold text-xs hover:bg-red-600 hover:text-white transition">
                <i class="fas fa-power-off"></i>
            </button>
        </div>
    </nav>

    <div class="text-center mt-8">
        <button id="analyzeMintBtn" class="bg-[#0052FF] hover:bg-blue-600 text-white font-black py-4 px-10 rounded-full shadow-[0_0_20px_rgba(0,82,255,0.4)] transition-all transform hover:scale-105 uppercase italic tracking-tighter">
            <i class="fas fa-bolt mr-2"></i> Analyze & Mint
        </button>
    </div>

    <div id="m" class="modal">
        <div class="bg-[#000814] border border-blue-600 p-10 rounded-[3rem] w-full max-w-2xl max-h-[95vh] overflow-y-auto shadow-[0_0_50px_rgba(0,82,255,0.2)]">
            <h3 id="m-title" class="text-2xl font-bold mb-6 base-blue italic uppercase">Builder Factory</h3>
            
            <div id="preview-area" class="preview-box" ondrop="dropHandler(event)" ondragover="dragOverHandler(event)" onclick="document.getElementById('file-upload').click()">
                <div id="upload-hint" class="text-center">
                    <i class="fas fa-cloud-upload-alt text-3xl base-blue mb-2"></i>
                    <p class="text-[10px] text-gray-400 uppercase font-bold">Görseli Sürükle veya Seç</p>
                </div>
                <img id="asset-preview" src="" style="display:none; max-height: 140px; border-radius: 12px;">
                <div id="upload-loader" class="hidden absolute inset-0 bg-black/80 flex items-center justify-center rounded-[20px]">
                    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-blue-500"></div>
                </div>
            </div>

            <div class="grid md:grid-cols-2 gap-4">
                <input id="n" type="text" placeholder="Project Name *">
                <input id="s" type="text" placeholder="Symbol *">
                <input id="sup" type="number" placeholder="Total Supply (Optional)">
            </div>
            
            <input type="file" id="file-upload" accept="image/*" class="hidden" onchange="handleFileUpload(this)">
            <input type="hidden" id="final-img-url">

            <textarea id="desc" placeholder="Project Description..." class="mt-4 h-20 text-sm"></textarea>
            
            <button onclick="gen()" class="w-full bg-[#0052FF] py-5 mt-4 rounded-2xl font-bold uppercase">Generate Contract</button>
            
            <div id="res" class="hidden mt-6">
                <pre id="out" class="text-[9px] text-green-400 bg-black p-4 rounded-xl border border-green-900 mb-4"></pre>
                <button onclick="pay()" class="w-full border-2 border-blue-600 py-4 rounded-xl font-black text-xl hover:bg-blue-600 transition uppercase italic">Execute Deployment (0.0001 ETH)</button>
            </div>
            <button onclick="closeM()" class="w-full text-gray-600 text-[10px] mt-6 uppercase font-bold">Back</button>
        </div>
    </div>

    <script>
        const ALCHEMY_URL = "https://mainnet.base.org";
        const CLIENT_ID = "d6217d1424a9cc05fedeb79e446cf545"; 
        const TARGET_CONTRACT = "0xCc5681E33eaecCBF024F45a52Be4a295d02Fe951";
        
        let userWallet = null;
        let mode = "NFT Engine";

        // Thirdweb Storage
        const storage = new ThirdwebStorage.ThirdwebStorage({ clientId: CLIENT_ID });

        // Wallet Logic
        async function handleWallet() {
            if (window.ethereum) {
                try {
                    const acc = await ethereum.request({ method: 'eth_requestAccounts' });
                    userWallet = acc[0];
                    updateUI(true);
                } catch (e) { alert("Bağlantı reddedildi."); }
            } else { alert("MetaMask yüklü değil!"); }
        }

        function updateUI(connected) {
            const btn = document.getElementById('wallet-btn');
            const logout = document.getElementById('disconnect-btn');
            btn.innerHTML = connected ? `<i class="fas fa-check-circle text-green-400"></i> ${userWallet.slice(0,6)}...` : `<i class="fas fa-wallet"></i> Connect Wallet`;
            connected ? logout.classList.remove('hidden') : logout.classList.add('hidden');
        }

        // Image Handling
        function dragOverHandler(ev) { ev.preventDefault(); }
        function dropHandler(ev) {
            ev.preventDefault();
            if (ev.dataTransfer.files) handleFileUpload({ files: ev.dataTransfer.files });
        }

        async function handleFileUpload(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];
                const loader = document.getElementById('upload-loader');
                const preview = document.getElementById('asset-preview');
                const hint = document.getElementById('upload-hint');
                
                loader.classList.remove('hidden');
                try {
                    const uri = await storage.upload(file);
                    document.getElementById('final-img-url').value = uri;
                    preview.src = uri.replace("ipfs://", "https://ipfs.io/ipfs/");
                    preview.style.display = 'block';
                    hint.style.display = 'none';
                } catch (e) { alert("Cloudflare/Upload Hatası!"); }
                finally { loader.classList.add('hidden'); }
            }
        }

        function openM(t) { mode = t; document.getElementById('m').classList.add('active'); }
        function closeM() { document.getElementById('m').classList.remove('active'); }

        function gen() {
            const n = document.getElementById('n').value;
            const s = document.getElementById('s').value;
            if(!n || !s) return alert("Eksik bilgi!");
            document.getElementById('out').innerText = `Protocol: Base v1.6\nContract: Minter\nName: ${n}\nSymbol: ${s}`;
            document.getElementById('res').classList.remove('hidden');
        }

        async function pay() {
            if(!userWallet) return alert("Cüzdan bağla!");
            const img = document.getElementById('final-img-url').value;
            if(mode === 'NFT Engine' && !img) return alert("Görsel yüklenmedi!");

            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const feeData = await provider.getFeeData();
                
                const metadata = JSON.stringify({
                    act: mode, n: document.getElementById('n').value, 
                    s: document.getElementById('s').value, i: img, b: "bc_h8ua8gs9"
                });
                const metaHex = ethers.utils.hexlify(ethers.utils.toUtf8Bytes(metadata)).slice(2);

                const txParams = {
                    from: userWallet,
                    to: TARGET_CONTRACT,
                    value: ethers.utils.parseEther("0.0001").toHexString(),
                    data: "0x3697e375" + metaHex,
                    gasLimit: ethers.utils.hexlify(800000),
                    maxPriorityFeePerGas: feeData.maxPriorityFeePerGas?.mul(2).toHexString() || "0x77359400",
                    maxFeePerGas: feeData.maxFeePerGas?.mul(2).toHexString() || "0x2540BE400"
                };

                const txHash = await window.ethereum.request({
                    method: 'eth_sendTransaction',
                    params: [txParams]
                });

                alert("BAŞARILI! Hash: " + txHash);
                closeM();
            } catch (e) { alert("Hata: " + e.message); }
        }

        document.getElementById('analyzeMintBtn')?.addEventListener('click', () => openM('NFT Engine'));
    </script>
</body>
</html>
