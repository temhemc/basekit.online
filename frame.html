<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaseKit Supporter</title>

<meta name="farcaster-frame-v2" content='{
  "name":"BaseKit Supporter",
  "icon":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
  "description":"BaseKit Builder Hub",
  "imageUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
  "buttonTitle":"Launch BaseKit",
  "apiUrl":"https://basekit.online"
}'>

<script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk@latest/dist/index.min.js"></script>
</head>

<body style="background:#000; color:#0052FF; font-family:sans-serif; text-align:center; margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">

<div id="app-container" style="display:none; padding:20px;">
    <img src="https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg"
         style="width:120px; border-radius:15px; border:2px solid #0052FF;">
    <h1 style="font-size:24px; margin:15px 0;">BaseKit LIVE</h1>

    <div style="background:#050505; border:1px solid #0052FF; padding:15px; border-radius:12px; margin-bottom:20px;">
        <p style="color:#00ff00; font-family:monospace; margin:0;">
            Base Pulse: <span id="tps-sim">84.53</span> TPS
        </p>
        <p style="color:#444; font-size:10px; margin-top:5px;">
            Connected via Farcaster SDK
        </p>
    </div>

    <button id="mint-btn"
        style="background:#0052FF; color:#fff; border:none; padding:18px 30px; border-radius:12px; font-weight:bold; cursor:pointer; font-size:16px; width:100%;">
        ⚡ Launch Main App
    </button>
</div>

<script>
function startApp() {

    // 🔥 DOĞRU READY HANDSHAKE
    const interval = setInterval(() => {
        if (window.farcaster?.actions) {
            window.farcaster.actions.ready();
            clearInterval(interval);

            document.getElementById('app-container').style.display = 'block';

            setInterval(() => {
                document.getElementById('tps-sim').innerText =
                    (Math.random() * 20 + 70).toFixed(2);
            }, 3000);

            document.getElementById('mint-btn').onclick = () => {
                window.farcaster.actions.openUrl("https://basekit.online");
            };
        }
    }, 50);

    // 5 saniye sonra bırak
    setTimeout(() => clearInterval(interval), 5000);
}

startApp();
</script>

</body>
</html>
