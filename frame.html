<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="fc:frame" content="vNext" />
    <meta property="fc:frame:image" content="https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg" />
    <meta property="fc:frame:button:1" content="⚡ Analyze & Mint" />
    <meta property="fc:frame:button:1:action" content="tx" />
    <meta property="fc:frame:button:1:target" content="https://basekit.online/api/tx-builder" />
    <meta property="fc:frame:post_url" content="https://basekit.online/api/confirm" />
    
    <meta name="fc:miniapp" content='{"version":"1","type":"launch_miniapp","name":"BaseKit Supporter","imageUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg"}' />

    <title>BaseKit Supporter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk/dist/bundle.min.js"></script>
</head>
<body style="background:#000; color:#0052FF; font-family:sans-serif; text-align:center; margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
    
    <div id="app-container" style="display:none; padding: 20px;">
        <img src="https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg" style="width:150px; border-radius:20px; border: 2px solid #0052FF;">
        <h1 style="font-size: 24px; margin: 20px 0;">BaseKit Supporter</h1>
        <p style="color:#fff;">Analyze activity on <b>Base</b> network.</p>
    </div>

    <script>
        // SDK yüklenmesini bekle ve hazır olunca içeriği aç
        async function run() {
            for (let i = 0; i < 50; i++) {
                if (window.frameSDK && window.frameSDK.actions) {
                    await window.frameSDK.actions.ready();
                    document.getElementById('app-container').style.display = 'block';
                    return;
                }
                await new Promise(resolve => setTimeout(resolve, 100));
            }
        }
        run();
    </script>
</body>
</html>
