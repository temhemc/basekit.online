<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="fc:frame" content='{"version":"next","imageUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg","button":{"title":"⚡ Analyze & Mint","action":{"type":"launch_frame","name":"BaseKit Supporter","url":"https://basekit.online","splashImageUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg","splashBackgroundColor":"#0052FF"}}}'>

    <title>BaseKit Supporter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk/dist/bundle.min.js"></script>
</head>
<body style="background:#000; color:#0052FF; font-family:sans-serif; text-align:center; margin:0; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh;">
    
    <div id="app-container" style="display:none; padding: 20px;">
        <img src="https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg" style="width:150px; border-radius:20px; border: 2px solid #0052FF; box-shadow: 0 0 20px rgba(0,82,255,0.4);">
        <h1 style="font-size: 24px; margin: 20px 0;">BaseKit is LIVE!</h1>
        <p style="color:#fff;">Analyze your activity on <b>Base</b> network.</p>
        
        <div id="pulse-data" style="margin: 10px 0; color: #00ff00; font-family: monospace; border: 1px solid #00ff00; padding: 10px; border-radius: 8px;">
            Base Pulse: <span id="pulse-value">84.53</span> TPS
        </div>
        
        <button id="mint-action-btn" style="background:#0052FF; color:#fff; border:none; padding:15px 30px; border-radius:12px; font-weight:bold; cursor:pointer; font-size:16px; margin-top: 10px; box-shadow: 0 4px 15px rgba(0,82,255,0.3);">⚡ Analyze & Mint Badge</button>
        <p id="error-msg" style="color: red; font-size: 12px; margin-top: 10px; display: none;"></p>
    </div>

    <script>
        const init = async () => {
            const sdk = window.frameSDK;
            if (sdk) {
                try {
                    await sdk.actions.ready();
                    document.getElementById('app-container').style.display = 'block';

                    // Buton Tıklama Olayı
                    document.getElementById('mint-action-btn').addEventListener('click', async () => {
                        const errorEl = document.getElementById('error-msg');
                        errorEl.style.display = 'none';
                        
                        try {
                            // VERİYİ DOĞRUDAN BURAYA GÖMDÜK (Hata payı yok)
                            await sdk.actions.sendTransaction({
                                chainId: 8453, // Base Mainnet
                                method: "eth_sendTransaction",
                                params: {
                                    abi: [{
                                        "name": "mint",
                                        "type": "function",
                                        "inputs": [{"name": "to", "type": "address"}],
                                        "outputs": [],
                                        "stateMutability": "payable"
                                    }],
                                    to: "0x6540D5400Bc811B06325c11d1E678bE1d117EA07",
                                    data: "0x40c10f190000000000000000000000004604a0FD65843F8b6E7cD8E67C5E3dFf7B0c9c12",
                                    value: "1000000000000000" // 0.001 ETH
                                }
                            });
                        } catch (e) {
                            console.error("Mint Hatası:", e);
                            errorEl.innerText = "Transaction failed or cancelled.";
                            errorEl.style.display = 'block';
                        }
                    });

                } catch (err) {
                    console.error("SDK Hatası:", err);
                    document.getElementById('app-container').style.display = 'block';
                }
            } else {
                // Tarayıcı fall-back
                document.getElementById('app-container').style.display = 'block';
            }
        };

        if (document.readyState === "complete") { init(); } 
        else { window.addEventListener("load", init); }
    </script>
</body>
</html>
