<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Base SPIN | Jackpot Wheel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background:#0b0f1c; color:white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align:center; padding: 40px; }
        .spin-container { background:#111827; padding:40px; border-radius:30px; width:450px; margin:auto; box-shadow:0 0 60px rgba(0,82,255,0.25); border: 1px solid #1e293b; }
        
        .wheel-box { position: relative; width: 320px; height: 320px; margin: 30px auto; }
        .wheel { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #0052ff; position: relative; overflow: hidden; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); background: conic-gradient(#ffd700 0% 1%, #0052ff 1% 100%); }
        .wheel-marker { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 24px; height: 35px; background: #ff4444; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 20; }

        .btn-main { background:#0052ff; border:none; padding:18px 30px; color:white; font-size:18px; border-radius:15px; cursor:pointer; margin-top:10px; font-weight: 800; width: 100%; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,82,255,0.4); }
        .btn-main:hover:not(:disabled) { background: #0040cc; transform: translateY(-2px); }
        .btn-main:disabled { background: #1e293b; color: #4b5563; cursor: not-allowed; box-shadow: none; }
        
        #status { margin-top:25px; font-size:16px; color: #94a3b8; line-height: 1.6; min-height: 50px; }
        .win-text { color: #4ade80; font-weight: bold; font-size: 20px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="spin-container">
        <h1 style="margin-bottom:5px;">🎡 Base SPIN</h1>
        <p style="color:#60a5fa; font-weight:bold; margin-top:0;">Jackpot: 0.003 ETH (1/1000)</p>
        
        <div class="wheel-box">
            <div class="wheel-marker"></div>
            <div id="wheel" class="wheel"></div>
        </div>

        <button onclick="connectWallet()" id="connectBtn" class="btn-main">Connect Wallet</button>
        <button onclick="launchSpin()" id="spinBtn" class="btn-main" style="display:none;">SPIN (0.0005 ETH)</button>
        
        <div id="status">Connect your MetaMask on Base Mainnet to play.</div>
    </div>

<script>
let provider, signer, user;
const contractAddress = "0xF4b2C87a8d661B276843dc2Cbf3468cA39eCCA9c";
const contractABI = [
    "function spin() payable",
    "event SpinResult(address indexed player, bool won, uint256 prize, uint256 dice)"
];

async function connectWallet() {
    if(window.ethereum) {
        try {
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            user = await signer.getAddress();
            document.getElementById("status").innerText = "Wallet: " + user.slice(0,6) + "..." + user.slice(-4);
            document.getElementById("connectBtn").style.display = 'none';
            document.getElementById("spinBtn").style.display = 'block';
        } catch (err) { document.getElementById("status").innerText = "Connection failed!"; }
    } else { alert("Please install MetaMask!"); }
}

async function launchSpin() {
    const spinBtn = document.getElementById("spinBtn");
    const status = document.getElementById("status");
    const wheel = document.getElementById("wheel");
    const contract = new ethers.Contract(contractAddress, contractABI, signer);

    try {
        spinBtn.disabled = true;
        status.innerText = "Confirm transaction in MetaMask...";

        const tx = await contract.spin({ value: ethers.utils.parseEther("0.0005") });
        status.innerText = "Transaction confirmed! Spinning the wheel... 🎡";
        
        // Rastgele görsel dönüş (En az 10 tur)
        const randomDegree = Math.floor(Math.random() * 360) + 3600; 
        wheel.style.transform = `rotate(${randomDegree}deg)`;

        const receipt = await tx.wait();
        const event = receipt.events.find(e => e.event === "SpinResult");
        
        const won = event.args.won;
        const prize = ethers.utils.formatEther(event.args.prize);
        const dice = event.args.dice.toNumber();

        setTimeout(() => {
            if(won) {
                status.innerHTML = `<span class="win-text">🔥 JACKPOT! You won ${prize} ETH!</span><br>Dice: ${dice}`;
            } else {
                status.innerHTML = `💀 Not this time! Dice: ${dice}<br>Try again for the 1/1000 prize!`;
            }
            spinBtn.disabled = false;
        }, 5000); // Çark durana kadar bekle

    } catch (e) {
        status.innerText = "Transaction failed or cancelled.";
        spinBtn.disabled = false;
    }
}
</script>
</body>
</html>
