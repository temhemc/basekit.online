<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseKit Gateway</title>
    <meta name="farcaster-frame-v2" content='{"name":"BaseKit Supporter","icon":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg","description":"Professional Base Builder Infrastructure","imageUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg","buttonTitle":"Launch BaseKit","apiUrl":"https://basekit.online"}'>
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk@latest/dist/index.min.js"></script>
</head>
<body style="background:#000; color:#0052FF; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; font-family:sans-serif;">
    <script>
        async function init() {
            const sdk = window.farcaster?.sdk;
            if (sdk) {
                try {
                    // Dökümantasyondaki kritik adım: ready() çağrısı
                    await sdk.actions.ready();
                    console.log("Mini App Displayed");
                    // Mavi ekran kalktıktan sonra ana uygulamaya geç
                    window.location.href = "index.html";
                } catch (e) {
                    console.error("Handshake failed", e);
                }
            }
        }
        // SDK'nın yüklenmesini bekle ve başlat
        const checkSDK = setInterval(() => {
            if (window.farcaster?.sdk) {
                clearInterval(checkSDK);
                init();
            }
        }, 50);
    </script>
    <div style="text-align:center;">
        <h1 style="letter-spacing:10px; font-weight:900;">BASEKIT</h1>
        <p style="color:#444; font-size:10px; text-transform:uppercase;">Loading Infrastructure...</p>
    </div>
</body>
</html>
