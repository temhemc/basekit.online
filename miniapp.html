<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseKit Mini App | Farcaster</title>

    <meta name="farcaster-miniapp-v1" content='{
        "version":"1",
        "name":"BaseKit Supporter",
        "description":"BaseKit builder hub inside Farcaster mini apps",
        "iconUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
        "homeUrl":"https://basekit.online/miniapp.html",
        "splashImageUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
        "splashBackgroundColor":"#000000",
        "primaryCategory":"utility",
        "tags":["base","toolkit","nft","mint","supporter"],
        "requiredChains":["eip155:8453"],
        "requiredCapabilities":["actions.ready","actions.openUrl"]
    }' />

    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk@latest/dist/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/@thirdweb-dev/storage@latest/dist/thirdweb-dev-storage.browser.umd.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { margin:0; font-family: 'Space Grotesk', sans-serif; background:#000; color:#fff; }
        iframe { width:100vw; height:100vh; border:none; }
    </style>
</head>
<body>

    <!-- Ana index.html'i mini app içine iframe olarak gömüyoruz -->
    <iframe src="https://basekit.online"></iframe>

    <script>
        // Farcaster Mini App Handshake
        (function(){
            const handshake = setInterval(() => {
                if(window.farcaster && window.farcaster.actions) {
                    window.farcaster.actions.ready();
                    console.log("Farcaster Mini App Handshake: SUCCESS");
                    clearInterval(handshake);
                }
            }, 50);
            setTimeout(()=>clearInterval(handshake),5000);
        })();
    </script>
</body>
</html>
