<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseKit Mini App | Farcaster</title>

    <meta name="farcaster-frame-v2" content='{
        "version": "1",
        "name": "BaseKit Supporter",
        "description": "BaseKit builder hub inside Farcaster",
        "icon": "https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
        "homeUrl": "https://basekit.online/miniapp.html",
        "imageUrl": "https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
        "buttonTitle": "Launch BaseKit",
        "apiUrl": "https://basekit.online"
    }' />

    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk@latest/dist/index.min.js"></script>
    
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; }
        iframe { width:100%; height:100%; border:none; display:block; }
        
        /* Loading Ekranı (İsteğe bağlı, profesyonel durur) */
        #loader {
            position: fixed; inset: 0; background: #000; display: flex; 
            align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="loader">
        <h2 style="color:#0052FF; font-family:sans-serif; letter-spacing:5px; animation: pulse 1.5s infinite;">BASEKIT...</h2>
    </div>

    <iframe id="main-app" src="https://basekit.online" onload="document.getElementById('loader').style.display='none'"></iframe>

    <script>
        async function initMiniApp() {
            // SDK v2 Erişim yolu düzeltildi
            const sdk = window.farcaster?.sdk;
            if (!sdk) return;

            try {
                // MAVİ EKRANI (SPLASH) KAPATAN KRİTİK SİNYAL
                await sdk.actions.ready();
                console.log("Farcaster Mini App Handshake: SUCCESS");
            } catch (err) {
                console.error("Handshake error:", err);
            }
        }

        // SDK yüklenmesi için güvenli döngü
        const checkSDK = setInterval(() => {
            if (window.farcaster?.sdk) {
                clearInterval(checkSDK);
                initMiniApp();
            }
        }, 50);

        setTimeout(() => clearInterval(checkSDK), 5000);
    </script>

    <style>
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</body>
</html>
