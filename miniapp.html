<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BaseKit Supporter MiniApp</title>

  <meta name="farcaster-miniapp" content='{
    "name":"BaseKit Supporter",
    "description":"BaseKit builder hub inside Farcaster mini apps",
    "iconUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
    "homeUrl":"https://basekit.online/miniapp.html",
    "splashImageUrl":"https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
    "splashBackgroundColor":"#0052FF",
    "primaryCategory":"utility",
    "tags":["base","toolkit","nft","mint","supporter"],
    "requiredChains":["eip155:8453"],
    "requiredCapabilities":["actions.ready","actions.openUrl"]
  }'>

  <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk@latest/dist/index.min.js"></script>

  <style>
    body { background:#00050a; color:#fff; font-family:sans-serif; display:flex; justify-content:center; align-items:center; flex-direction:column; height:100vh; margin:0; text-align:center; }
    img { width:120px; border-radius:15px; border:2px solid #0052FF; margin-bottom: 15px; }
    h1 { font-size:24px; margin-bottom:15px; }
    .pulse-box { background:#050505; border:1px solid #0052FF; padding:15px; border-radius:12px; margin-bottom:20px; color:#00ff00; font-family:monospace; }
    button { background:#0052FF; color:#fff; border:none; padding:18px 30px; border-radius:12px; font-weight:bold; cursor:pointer; font-size:16px; width:80%; max-width:300px; }
    #status-debug { margin-top:15px; font-size:12px; color:#888; }
  </style>
</head>
<body>
  <img src="https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg" alt="BaseKit Icon">
  <h1>BaseKit LIVE</h1>
  <div class="pulse-box">Base Pulse: <span id="tps-sim">84.53</span> TPS</div>
  <button id="launch-btn">⚡ Launch Main App</button>
  <p id="status-debug">Connecting via Farcaster SDK...</p>

  <script>
    async function initMiniApp() {
      const sdk = window.farcaster?.sdk;
      if (!sdk) {
        document.getElementById('status-debug').innerText = "Farcaster SDK not loaded yet.";
        return;
      }

      try {
        await sdk.actions.ready();
        document.getElementById('status-debug').innerText = "Ready to launch BaseKit!";

        setInterval(() => {
          document.getElementById('tps-sim').innerText = (Math.random()*20+70).toFixed(2);
        }, 3000);

        document.getElementById('launch-btn').addEventListener('click', () => {
          sdk.actions.openUrl("https://basekit.online");
        });
      } catch (err) {
        console.error("Farcaster MiniApp Error:", err);
        document.getElementById('status-debug').innerText = "Error initializing mini app.";
      }
    }

    const checkSDK = setInterval(() => {
      if(window.farcaster?.sdk){
        clearInterval(checkSDK);
        initMiniApp();
      }
    }, 50);
  </script>
</body>
</html>
