<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BaseKit Mini App</title>

    <meta name="farcaster-frame-v2" content='{
        "version": "1",
        "name": "BaseKit Supporter",
        "description": "BaseKit Builder Infrastructure",
        "icon": "https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
        "homeUrl": "https://basekit.online/miniapp.html",
        "imageUrl": "https://i.postimg.cc/RhSpzSmW/Screenshot-57.jpg",
        "buttonTitle": "Launch BaseKit",
        "apiUrl": "https://basekit.online"
    }' />

    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk@latest/dist/index.min.js"></script>

    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#000; font-family: sans-serif; }
        #loader { 
            position: fixed; inset: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; background: #000; z-index: 100;
        }
        iframe { width:100%; height:100%; border:none; display:block; }
        .spinner { border: 4px solid rgba(0, 82, 255, 0.1); border-left-color: #0052FF; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <h2 style="color:#0052FF; letter-spacing:5px; margin-top:20px;">BASEKIT</h2>
    </div>

    <iframe id="main-app" src="https://basekit.online/index.html"></iframe>

    <script>
        async function startHandshake() {
            // Sinyal gidene kadar her 100ms'de bir dene
            const interval = setInterval(async () => {
                const sdk = window.farcaster?.sdk || window.farcaster;
                
                if (sdk && (sdk.actions || sdk.sdk?.actions)) {
                    try {
                        // Hem v1 hem v2 SDK yapısını destekleyen hazır komutu
                        if (sdk.actions?.ready) await sdk.actions.ready();
                        else if (sdk.sdk?.actions?.ready) await sdk.sdk.actions.ready();
                        
                        console.log("HANDSHAKE SUCCESS!");
                        clearInterval(interval);
                        
                        // Mavi ekran kapandıktan sonra loader'ı kaldır
                        setTimeout(() => {
                            document.getElementById('loader').style.opacity = '0';
                            setTimeout(() => document.getElementById('loader').remove(), 500);
                        }, 500);
                    } catch (e) {
                        console.error("Handshake attempt failed:", e);
                    }
                }
            }, 100);

            // 10 saniye sonra hala açılmadıysa zorla loader'ı kaldır (güvenlik için)
            setTimeout(() => clearInterval(interval), 10000);
        }

        // Sayfa yüklenir yüklenmez başlat
        startHandshake();
    </script>
</body>
</html>
