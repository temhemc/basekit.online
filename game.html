<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Base Raid Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body{ background:#0b0f1c; color:white; font-family:Arial; text-align:center; padding-top:100px; }
        .card{ background:#111827; padding:40px; border-radius:20px; width:400px; margin:auto; box-shadow:0 0 40px rgba(0,150,255,0.3); }
        button{ background:#0052ff; border:none; padding:15px 25px; color:white; font-size:18px; border-radius:10px; cursor:pointer; margin-top:20px; transition: 0.3s; }
        button:hover{ background:#0040cc; transform: scale(1.05); }
        #result{ margin-top:20px; font-size:18px; color: #60a5fa; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚔ Base Raid</h1>
        <p>First Raid FREE<br>Next Raids 0.0005 ETH</p>
        <button onclick="connectWallet()">Connect Wallet</button>
        <br>
        <button onclick="launchRaid()">Launch Raid</button>
        <div id="result">Waiting connection...</div>
    </div>

<script>
let provider, signer, user;
const contractAddress = "0x1A002588CA8d5aEe64eFc655295b96E38b634c3a";
const contractABI = [
    "function raid() payable",
    "function hasPlayedFree(address) view returns (bool)",
    "event RaidResult(address indexed player, uint256 result)"
];

async function connectWallet(){
    try {
        if(window.ethereum){
            // Yeni ve daha stabil bağlantı yöntemi
            await window.ethereum.request({ method: 'eth_requestAccounts' });
            provider = new ethers.providers.Web3Provider(window.ethereum);
            signer = provider.getSigner();
            user = await signer.getAddress();
            document.getElementById("result").innerText = "Connected: " + user.slice(0,6) + "...";
            console.log("Bağlanan adres:", user);
        } else {
            alert("MetaMask bulunamadı!");
        }
    } catch (err) {
        console.error("Bağlantı hatası:", err);
        document.getElementById("result").innerText = "Connection failed!";
    }
}

async function launchRaid(){
    if(!signer){ alert("Please connect wallet first!"); return; }
    const contract = new ethers.Contract(contractAddress, contractABI, signer);
    try {
        const played = await contract.hasPlayedFree(user);
        let tx;
        if(!played) {
            tx = await contract.raid();
        } else {
            tx = await contract.raid({ value: ethers.utils.parseEther("0.0005") });
        }
        document.getElementById("result").innerText = "Raid sent 🚀 Waiting...";
        const receipt = await tx.wait();
        const event = receipt.events.find(e => e.event === "RaidResult");
        const res = event.args.result.toNumber();
        document.getElementById("result").innerText = "Dice: " + res + (res >= 70 ? " 🔥 WIN!" : " 💀 LOSE");
    } catch (e) {
        document.getElementById("result").innerText = "Error: Check balance or network.";
    }
}
</script>
</body>
</html>
